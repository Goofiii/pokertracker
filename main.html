<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Tracker">
<meta name="theme-color" content="#0d0d14">
<title>Poker Tracker</title>
<style>

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
background: #0d0d14;
height: 100%;
}

body {
background: #0d0d14;
color: #eeeef5;
font-family: -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, Helvetica, Arial, sans-serif;
font-size: 16px;
-webkit-font-smoothing: antialiased;
height: 100%;
overflow: hidden;
position: fixed;
width: 100%;
top: 0; left: 0;
}

/* ────────────────────────────
APP SHELL
padding-top  = status bar / notch / dynamic island
padding-bottom = home indicator
We use env() only for layout spacing, NOT for colors.
──────────────────────────── */
#app {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
display: flex;
flex-direction: column;
background: #0d0d14;
/* push content below notch/dynamic-island */
padding-top: env(safe-area-inset-top, 44px);
}

/* ────────────────────────────
SCREENS
──────────────────────────── */
.screen {
display: none;
flex-direction: column;
flex: 1;
overflow: hidden;
background: #0d0d14;
}
.screen.active { display: flex; }

.scroll-area {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
overscroll-behavior: none;
/* bottom padding = nav bar (58px) + home indicator */
padding: 16px 16px calc(58px + env(safe-area-inset-bottom, 34px) + 12px);
}

/* ────────────────────────────
TOP BAR
──────────────────────────── */
.topbar {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 16px;
height: 52px;
background: #0d0d14;
border-bottom: 1px solid #1e1e2e;
}
.topbar h1 {
font-size: 20px;
font-weight: 700;
letter-spacing: -0.3px;
color: #eeeef5;
}
.topbar-meta { font-size: 12px; color: #44445a; margin-top: 1px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.back-btn {
display: inline-flex; align-items: center; gap: 4px;
background: none; border: none;
color: #7c6fff; font-size: 16px; font-weight: 500;
cursor: pointer; padding: 6px 0;
}
.back-btn svg { color: #7c6fff; }

/* ────────────────────────────
BOTTOM NAV
──────────────────────────── */
#nav {
position: fixed;
bottom: 0; left: 0; right: 0;
background: #0a0a11;
border-top: 1px solid #1e1e2e;
display: flex;
align-items: flex-start;
z-index: 100;
/* total height = buttons (58px) + home indicator gap */
padding-bottom: env(safe-area-inset-bottom, 34px);
}
.nav-btn {
flex: 1;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 3px;
height: 58px;
background: none; border: none;
color: #3a3a52;
font-size: 10px; font-weight: 500; letter-spacing: 0.2px;
cursor: pointer;
}
.nav-btn svg { width: 22px; height: 22px; color: #3a3a52; }
.nav-btn.active { color: #7c6fff; }
.nav-btn.active svg { color: #7c6fff; }

.nav-center {
flex: 1;
display: flex; flex-direction: column;
align-items: center;
height: 58px;
background: none; border: none;
cursor: pointer;
position: relative;
padding-top: 0;
}
.nav-center-disc {
width: 46px; height: 46px;
border-radius: 50%;
background: #7c6fff;
display: flex; align-items: center; justify-content: center;
margin-top: -10px;
box-shadow: 0 0 0 4px #0a0a11, 0 4px 20px rgba(124,111,255,0.6);
}
.nav-center-disc svg { width: 22px; height: 22px; color: #ffffff; }
.nav-center-label { font-size: 10px; font-weight: 500; color: #3a3a52; margin-top: 2px; }

/* ────────────────────────────
STAT CARDS
──────────────────────────── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-box {
background: #13131e;
border: 1px solid #1e1e2e;
border-radius: 12px;
padding: 14px 12px;
}
.stat-lbl { font-size: 10px; font-weight: 600; color: #44445a; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
.stat-val { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; color: #eeeef5; }
.c-green  { color: #00e676; }
.c-red    { color: #ff5252; }
.c-gold   { color: #ffd60a; }
.c-purple { color: #7c6fff; }

/* ────────────────────────────
BUTTONS
──────────────────────────── */
.btn {
display: inline-flex; align-items: center; justify-content: center; gap: 6px;
padding: 14px 18px;
border-radius: 12px; border: none;
font-size: 15px; font-weight: 600;
cursor: pointer;
-webkit-user-select: none;
transition: opacity 0.15s, transform 0.1s;
width: 100%;
letter-spacing: -0.1px;
}
.btn:active { opacity: 0.7; transform: scale(0.97); }

.btn-primary {
background: #7c6fff;
color: #ffffff;
}
.btn-secondary {
background: #1a1a27;
color: #aaaacc;
border: 1px solid #2a2a3e;
}
.btn-danger {
background: rgba(255,82,82,0.12);
color: #ff5252;
border: 1px solid rgba(255,82,82,0.25);
}
.btn-ghost {
background: transparent;
color: #6666884;
width: auto;
padding: 8px 12px;
font-size: 14px;
color: #7c6fff;
}
.btn-sm { padding: 9px 14px; font-size: 13px; border-radius: 9px; width: auto; }
.btn-icon {
padding: 9px; border-radius: 10px;
background: #1a1a27; border: 1px solid #2a2a3e;
color: #8888aa; width: auto;
}
.btn-icon svg { width: 17px; height: 17px; color: #8888aa; display: block; }
.btn-icon.danger svg { color: #ff5252; }

/* ────────────────────────────
FORM FIELDS
──────────────────────────── */
.field { margin-bottom: 16px; }
.field-label {
display: block; font-size: 11px; font-weight: 600;
color: #44445a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.field input,
.field textarea {
display: block; width: 100%;
background: #13131e;
border: 1px solid #2a2a3e;
border-radius: 11px;
padding: 13px 14px;
font-size: 16px;
color: #eeeef5;
outline: none;
-webkit-appearance: none;
appearance: none;
transition: border-color 0.18s;
font-family: inherit;
}
.field input:focus,
.field textarea:focus { border-color: #7c6fff; }
.field textarea { resize: none; min-height: 68px; }
/* kill iOS spinners */
.field input[type=“number”]::-webkit-inner-spin-button,
.field input[type=“number”]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* ────────────────────────────
LIST ROWS
──────────────────────────── */
.row {
display: flex; align-items: center; gap: 12px;
padding: 13px 14px;
background: #13131e;
border: 1px solid #1e1e2e;
border-radius: 12px;
margin-bottom: 8px;
cursor: pointer;
-webkit-user-select: none;
}
.row:active { background: #1a1a27; }
.row-avatar {
width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
background: rgba(124,111,255,0.12);
border: 1px solid rgba(124,111,255,0.22);
display: flex; align-items: center; justify-content: center;
font-size: 14px; font-weight: 700; color: #7c6fff;
}
.row-icon {
width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
background: rgba(124,111,255,0.1);
display: flex; align-items: center; justify-content: center;
font-size: 18px;
}
.row-body { flex: 1; min-width: 0; }
.row-name { font-size: 15px; font-weight: 600; color: #eeeef5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub  { font-size: 12px; color: #44445a; margin-top: 2px; }
.row-end  { text-align: right; flex-shrink: 0; }
.row-val  { font-size: 16px; font-weight: 700; color: #eeeef5; }

/* ────────────────────────────
TABLE
──────────────────────────── */
.tbl-wrap { border-radius: 12px; overflow: hidden; border: 1px solid #1e1e2e; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead tr { background: #111120; }
th { padding: 9px 10px; font-size: 10px; font-weight: 600; color: #44445a; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }
tbody tr { background: #13131e; }
tbody tr:nth-child(even) { background: #111120; }
tbody tr.tr-win  td { background: rgba(0,230,118,0.05); }
tbody tr.tr-loss td { background: rgba(255,82,82,0.05); }
td { padding: 11px 10px; color: #eeeef5; border-top: 1px solid #1a1a28; }
.td-pl { font-weight: 700; }

/* ────────────────────────────
MISC
──────────────────────────── */
.sec-title { font-size: 11px; font-weight: 600; color: #44445a; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.divider { height: 1px; background: #1e1e2e; margin: 14px 0; }
.empty { text-align: center; padding: 60px 20px; }
.empty-ico   { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-size: 17px; font-weight: 600; color: #8888aa; margin-bottom: 6px; }
.empty-sub   { font-size: 14px; color: #44445a; }

/* ────────────────────────────
SESSION FORM – player toggles
──────────────────────────── */
.ptoggle-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.ptoggle {
padding: 8px 14px; border-radius: 20px;
background: #13131e; border: 1px solid #2a2a3e;
color: #8888aa; font-size: 14px; font-weight: 500;
cursor: pointer;
}
.ptoggle.on {
background: rgba(124,111,255,0.14);
border-color: #7c6fff;
color: #a89fff;
}

/* player result row inside form */
.pr-row {
background: #13131e; border: 1px solid #1e1e2e;
border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
}
.pr-head {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 10px;
}
.pr-name { font-size: 15px; font-weight: 600; color: #eeeef5; }
.pr-preview { font-size: 13px; font-weight: 600; color: #44445a; }
.pr-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mini-label { display: block; font-size: 10px; font-weight: 600; color: #44445a; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
.mini-input {
width: 100%; display: block;
background: #0d0d14; border: 1px solid #2a2a3e;
border-radius: 9px; padding: 10px 12px;
font-size: 16px; color: #eeeef5; outline: none;
-webkit-appearance: none; appearance: none;
font-family: inherit;
transition: border-color 0.18s;
}
.mini-input:focus { border-color: #7c6fff; }
.mini-input::-webkit-inner-spin-button,
.mini-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* balance row */
.bal-row {
display: flex; align-items: center; justify-content: space-between;
background: #13131e; border: 1px solid #1e1e2e;
border-radius: 11px; padding: 12px 14px; margin-bottom: 12px;
font-size: 14px;
}
.bal-lbl { color: #44445a; font-weight: 500; }
.bal-val { font-weight: 700; color: #eeeef5; }
.warn-box {
background: rgba(255,214,10,0.07); border: 1px solid rgba(255,214,10,0.22);
border-radius: 11px; padding: 11px 14px;
font-size: 13px; color: #ffd60a;
margin-bottom: 12px; display: none;
}
.warn-box.on { display: block; }

/* ────────────────────────────
LEADERBOARD TABS
──────────────────────────── */
.lb-tabs {
display: flex; background: #13131e;
border: 1px solid #1e1e2e;
border-radius: 11px; padding: 3px;
margin-bottom: 16px; gap: 0;
}
.lb-tab {
flex: 1; padding: 8px 4px; border-radius: 8px;
background: none; border: none;
color: #44445a; font-size: 13px; font-weight: 600;
cursor: pointer; text-align: center;
transition: background 0.15s, color 0.15s;
}
.lb-tab.active { background: #1f1f30; color: #eeeef5; }

/* rank bubble */
.rank { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.r1 { background: rgba(255,214,10,0.12); color: #ffd60a; }
.r2 { background: rgba(180,180,200,0.1); color: #b0b0c8; }
.r3 { background: rgba(180,100,40,0.12); color: #c87840; }
.rn { background: #1a1a27; color: #44445a; }

/* ────────────────────────────
BOTTOM SHEET MODAL
──────────────────────────── */
.sheet-bg {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.72); z-index: 300;
align-items: flex-end;
}
.sheet-bg.open { display: flex; }
.sheet {
background: #13131e;
border-radius: 20px 20px 0 0;
border-top: 1px solid #2a2a3e;
width: 100%; max-height: 88vh;
display: flex; flex-direction: column;
padding-bottom: env(safe-area-inset-bottom, 34px);
animation: sheetup 0.26s cubic-bezier(0.32,0.72,0,1);
}
@keyframes sheetup { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-grip { width: 34px; height: 5px; background: #2a2a3e; border-radius: 3px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; flex-shrink: 0; }
.sheet-title { font-size: 18px; font-weight: 700; color: #eeeef5; }
.sheet-body { padding: 4px 20px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }

/* ────────────────────────────
CONFIRM DIALOG
──────────────────────────── */
.cfm-bg {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.82); z-index: 400;
align-items: center; justify-content: center; padding: 24px;
}
.cfm-bg.open { display: flex; }
.cfm-box {
background: #18182a; border: 1px solid #2a2a3e;
border-radius: 20px; padding: 26px 22px;
width: 100%; max-width: 300px; text-align: center;
}
.cfm-box h3 { font-size: 18px; font-weight: 700; color: #eeeef5; margin-bottom: 8px; }
.cfm-box p  { font-size: 14px; color: #8888aa; margin-bottom: 22px; line-height: 1.5; }
.cfm-actions { display: flex; gap: 10px; }
.cfm-actions .btn { flex: 1; }

/* ────────────────────────────
TOAST
──────────────────────────── */
#toast {
position: fixed;
bottom: calc(58px + env(safe-area-inset-bottom, 34px) + 12px);
left: 50%; transform: translateX(-50%);
background: #23233a; border: 1px solid #2a2a3e;
color: #eeeef5; padding: 11px 22px;
border-radius: 30px; font-size: 14px; font-weight: 500;
white-space: nowrap; z-index: 500;
opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
#toast.on { opacity: 1; }

canvas { display: block; }
</style>

</head>
<body>
<div id="app">

<!-- ████ DASHBOARD ████ -->

<div class="screen active" id="s-dashboard">
  <div class="topbar">
    <div>
      <h1>♠︎ Poker Tracker</h1>
      <div class="topbar-meta" id="db-meta"></div>
    </div>
  </div>
  <div class="scroll-area">
    <div class="stat-grid" id="db-stats"></div>
    <div class="sec-title">Recent Sessions</div>
    <div id="db-recent"></div>
    <div class="sec-title" style="margin-top:20px">Top Players</div>
    <div id="db-top"></div>
  </div>
</div>

<!-- ████ PLAYERS ████ -->

<div class="screen" id="s-players">
  <div class="topbar">
    <h1>Players</h1>
    <button class="btn btn-primary btn-sm" onclick="openSheet()">+ Add</button>
  </div>
  <div class="scroll-area" id="players-body"></div>
</div>

<!-- ████ ADD / EDIT SESSION ████ -->

<div class="screen" id="s-add">
  <div class="topbar"><h1 id="add-title">New Session</h1></div>
  <div class="scroll-area" id="add-scroll">
    <div class="field">
      <label class="field-label">Session Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Game Night #12" autocomplete="off" autocorrect="off">
    </div>
    <div class="field">
      <label class="field-label">Notes (optional)</label>
      <textarea id="f-notes" placeholder="Any notes…"></textarea>
    </div>
    <div class="sec-title">Select Players</div>
    <div class="ptoggle-wrap" id="ptoggles"></div>
    <div class="sec-title">Results</div>
    <div id="pr-rows"></div>
    <div class="bal-row" id="bal-row">
      <span class="bal-lbl">Balance check</span>
      <span class="bal-val" id="bal-val">—</span>
    </div>
    <div class="warn-box" id="warn-box">⚠ Buy-ins and cash-outs don't balance. Double-check before saving.</div>
    <button class="btn btn-primary" id="save-btn" onclick="saveSession()">Save Session</button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel</button>
    <input type="hidden" id="eid">
  </div>
</div>

<!-- ████ SESSIONS ████ -->

<div class="screen" id="s-sessions">
  <div class="topbar">
    <h1>Sessions</h1>
    <div class="topbar-meta" id="sess-meta"></div>
  </div>
  <div class="scroll-area" id="sessions-body"></div>
</div>

<!-- ████ LEADERBOARD ████ -->

<div class="screen" id="s-leaderboard">
  <div class="topbar"><h1>Leaderboard</h1></div>
  <div class="scroll-area">
    <div class="lb-tabs">
      <button class="lb-tab active" onclick="lbSwitch('profit',this)">Profit</button>
      <button class="lb-tab" onclick="lbSwitch('avg',this)">Average</button>
      <button class="lb-tab" onclick="lbSwitch('winrate',this)">Win Rate</button>
    </div>
    <div id="lb-body"></div>
  </div>
</div>

<!-- ████ SESSION DETAIL ████ -->

<div class="screen" id="s-sdetail">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back
    </button>
    <div class="topbar-right">
      <button class="btn btn-icon" onclick="editCurSession()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="btn btn-icon danger" onclick="deleteCurSession()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ff5252" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>
  </div>
  <div class="scroll-area" id="sdetail-body"></div>
</div>

<!-- ████ PLAYER DETAIL ████ -->

<div class="screen" id="s-pdetail">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back
    </button>
    <div class="topbar-right">
      <button class="btn btn-icon" onclick="editCurPlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="btn btn-icon danger" onclick="deleteCurPlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ff5252" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>
  </div>
  <div class="scroll-area" id="pdetail-body"></div>
</div>

<!-- ████ BOTTOM NAV ████ -->

<nav id="nav">
  <button class="nav-btn active" id="nb-dashboard" onclick="go('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Home
  </button>
  <button class="nav-btn" id="nb-players" onclick="go('players')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Players
  </button>
  <button class="nav-center" id="nb-add" onclick="go('add')">
    <div class="nav-center-disc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <span class="nav-center-label">New</span>
  </button>
  <button class="nav-btn" id="nb-sessions" onclick="go('sessions')">

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const DB = (() => {
  let P=null, S=null;
  const load = (k,d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e) { return d; } };
  return {
    P() { return P || (P = load('ptP', [])); },
    S() { return S || (S = load('ptS', [])); },
    saveP() { localStorage.setItem('ptP', JSON.stringify(P)); },
    saveS() { localStorage.setItem('ptS', JSON.stringify(S)); },
    addP(x)    { this.P().push(x); this.saveP(); },
    putP(id,x) { const i=this.P().findIndex(p=>p.id===id); if(i>=0){Object.assign(P[i],x);this.saveP();} },
    delP(id)   { P=this.P().filter(p=>p.id!==id); this.saveP(); },
    getP(id)   { return this.P().find(p=>p.id===id); },
    addS(x)    { this.S().unshift(x); this.saveS(); },
    putS(id,x) { const i=this.S().findIndex(s=>s.id===id); if(i>=0){Object.assign(S[i],x);this.saveS();} },
    delS(id)   { S=this.S().filter(s=>s.id!==id); this.saveS(); },
    getS(id)   { return this.S().find(s=>s.id===id); },
    pstats(pid) {
      const ss = this.S().filter(s=>s.r.some(r=>r.pid===pid));
      let tot=0, bw=null, bl=null, wins=0;
      ss.forEach(s => {
        const r=s.r.find(r=>r.pid===pid); if(!r) return;
        const pnl=r.out-r.in; tot+=pnl;
        if(pnl>0) wins++;
        if(bw===null||pnl>bw) bw=pnl;
        if(bl===null||pnl<bl) bl=pnl;
      });
      const n=ss.length;
      return { n, tot, avg:n?tot/n:0, bw:bw||0, bl:bl||0, wr:n?(wins/n*100):0, ss };
    }
  };
})();

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fa  = n => '$' + Math.abs(n).toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
const fp  = n => (n>=0?'+':'-') + '$' + Math.abs(n).toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
const cc  = n => n>0 ? 'c-green' : n<0 ? 'c-red' : '';
const ini = s => s.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();

let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove('on'), 2400);
}

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
const MAIN = ['dashboard','players','add','sessions','leaderboard'];
let cur = 'dashboard', prev = 'dashboard';

function go(name, push=true) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('s-'+name);
  if (!el) return;
  el.classList.add('active');

  // update nav highlights
  document.querySelectorAll('.nav-btn, .nav-center').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nb-'+name);
  if (nb) nb.classList.add('active');

  // hide nav on sub-screens
  document.getElementById('nav').style.display = MAIN.includes(name) ? 'flex' : 'none';

  if (push) prev = cur;
  cur = name;

  const R = { dashboard:renderDash, players:renderPlayers, sessions:renderSessions, leaderboard:renderLB, add:initAdd };
  if (R[name]) R[name]();
}

function goBack() { go(prev||'dashboard'); }

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
function renderDash() {
  const ps=DB.P(), ss=DB.S();
  document.getElementById('db-meta').textContent =
    ps.length + ' player' + (ps.length!==1?'s':'') + ' · ' + ss.length + ' session' + (ss.length!==1?'s':'');

  let bigpot = 0;
  ss.forEach(s => { const t=s.r.reduce((a,r)=>a+r.in,0); if(t>bigpot) bigpot=t; });

  document.getElementById('db-stats').innerHTML = `
    <div class="stat-box"><div class="stat-lbl">Sessions</div><div class="stat-val c-purple">${ss.length}</div></div>
    <div class="stat-box"><div class="stat-lbl">Players</div><div class="stat-val c-purple">${ps.length}</div></div>
    <div class="stat-box"><div class="stat-lbl">Biggest Pot</div><div class="stat-val c-gold">${ss.length ? '$'+bigpot.toFixed(0) : '—'}</div></div>
    <div class="stat-box"><div class="stat-lbl">Last Game</div><div class="stat-val" style="font-size:15px">${ss.length ? esc(ss[0].name.slice(0,14)) : '—'}</div></div>`;

  const recent = ss.slice(0,3);
  document.getElementById('db-recent').innerHTML = recent.length
    ? recent.map(s => sessRow(s)).join('')
    : `<div class="empty"><div class="empty-ico">🃏</div><div class="empty-title">No sessions yet</div><div class="empty-sub">Tap + to add your first game</div></div>`;

  const ranked = ps.map(p=>({p, st:DB.pstats(p.id)})).sort((a,b)=>b.st.tot-a.st.tot).slice(0,3);
  document.getElementById('db-top').innerHTML = ranked.length
    ? ranked.map((x,i) => `
      <div class="row" onclick="openPD('${x.p.id}')">
        <div class="rank r${i<3?i+1:'n'}">${i+1}</div>
        <div class="row-avatar">${ini(x.p.name)}</div>
        <div class="row-body">
          <div class="row-name">${esc(x.p.name)}</div>
          <div class="row-sub">${x.st.n} session${x.st.n!==1?'s':''}</div>
        </div>
        <div class="row-end"><div class="row-val ${cc(x.st.tot)}">${fp(x.st.tot)}</div></div>
      </div>`).join('')
    : `<div style="color:#44445a;font-size:14px;padding:8px 0">No players added yet.</div>`;
}

/* ══════════════════════════════════════
   PLAYERS
══════════════════════════════════════ */
function renderPlayers() {
  const ps=DB.P(), el=document.getElementById('players-body');
  el.innerHTML = ps.length
    ? ps.map(p => {
        const st=DB.pstats(p.id);
        return `<div class="row" onclick="openPD('${p.id}')">
          <div class="row-avatar">${ini(p.name)}</div>
          <div class="row-body">
            <div class="row-name">${esc(p.name)}${p.nick?` <span style="color:#44445a;font-size:12px">"${esc(p.nick)}"</span>`:''}</div>
            <div class="row-sub">${st.n} session${st.n!==1?'s':''}</div>
          </div>
          <div class="row-end"><div class="row-val ${cc(st.tot)}">${fp(st.tot)}</div></div>
        </div>`;
      }).join('')
    : `<div class="empty"><div class="empty-ico">👤</div><div class="empty-title">No players yet</div><div class="empty-sub">Tap "Add" to create your first player</div></div>`;
}

let curPid = null;

function openSheet(editId) {
  curPid = editId || null;
  const p = editId ? DB.getP(editId) : null;
  document.getElementById('sheet-title').textContent = p ? 'Edit Player' : 'Add Player';
  document.getElementById('ps-name').value  = p?.name  || '';
  document.getElementById('ps-nick').value  = p?.nick  || '';
  document.getElementById('ps-notes').value = p?.notes || '';
  document.getElementById('ps-id').value    = editId   || '';
  document.getElementById('player-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('ps-name').focus(), 340);
}
function closeSheet() { document.getElementById('player-sheet').classList.remove('open'); }

function savePlayer() {
  const name = document.getElementById('ps-name').value.trim();
  if (!name) { showToast('Name is required'); return; }
  const data = { name, nick:document.getElementById('ps-nick').value.trim(), notes:document.getElementById('ps-notes').value.trim() };
  const id = document.getElementById('ps-id').value;
  if (id) { DB.putP(id, data); showToast('Player updated'); if(cur==='pdetail') renderPD(id); }
  else    { data.id=uid(); DB.addP(data); showToast('Player added'); }
  closeSheet(); renderPlayers();
}
function editCurPlayer()   { openSheet(curPid); }
function deleteCurPlayer() {
  confirm2('Delete Player?', 'They will be removed from the roster.', () => {
    DB.delP(curPid); showToast('Player deleted'); goBack(); renderPlayers();
  });
}

function openPD(id) { curPid=id; renderPD(id); go('pdetail',true); }

function renderPD(id) {
  const p=DB.getP(id); if(!p) return;
  const st=DB.pstats(id);
  const rows = st.ss.map(s => {
    const r=s.r.find(r=>r.pid===id), pnl=r.out-r.in;
    return `<div class="row" onclick="openSD('${s.id}')">
      <div class="row-body"><div class="row-name">${esc(s.name)}</div><div class="row-sub">${s.r.length} players · ${fa(r.in)} buy-in</div></div>
      <div class="row-end"><div class="row-val ${cc(pnl)}">${fp(pnl)}</div></div>
    </div>`;
  }).join('');

  document.getElementById('pdetail-body').innerHTML = `
    <div style="text-align:center;padding:28px 0 22px">
      <div style="width:70px;height:70px;border-radius:50%;background:rgba(124,111,255,0.14);border:2px solid rgba(124,111,255,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px;font-weight:800;color:#7c6fff">${ini(p.name)}</div>
      <div style="font-size:23px;font-weight:800;letter-spacing:-0.5px;color:#eeeef5">${esc(p.name)}</div>
      ${p.nick  ? `<div style="color:#44445a;font-size:14px;margin-top:3px">"${esc(p.nick)}"</div>` : ''}
      ${p.notes ? `<div style="color:#8888aa;font-size:13px;margin-top:8px;line-height:1.5">${esc(p.notes)}</div>` : ''}
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-lbl">Total Profit</div><div class="stat-val ${cc(st.tot)}">${fp(st.tot)}</div></div>
      <div class="stat-box"><div class="stat-lbl">Sessions</div><div class="stat-val c-purple">${st.n}</div></div>
      <div class="stat-box"><div class="stat-lbl">Avg / Session</div><div class="stat-val ${cc(st.avg)}">${st.n?fp(st.avg):'—'}</div></div>
      <div class="stat-box"><div class="stat-lbl">Win Rate</div><div class="stat-val ${st.wr>=50?'c-green':'c-red'}">${st.n?st.wr.toFixed(0)+'%':'—'}</div></div>
      <div class="stat-box"><div class="stat-lbl">Best Win</div><div class="stat-val c-green">${st.bw>0?fp(st.bw):'—'}</div></div>
      <div class="stat-box"><div class="stat-lbl">Worst Loss</div><div class="stat-val c-red">${st.bl<0?fp(st.bl):'—'}</div></div>
    </div>
    ${st.n>1 ? `<div style="background:#13131e;border:1px solid #1e1e2e;border-radius:12px;padding:16px;margin-bottom:14px"><div class="sec-title" style="margin-bottom:12px">Profit Over Time</div><canvas id="pchart" style="width:100%;height:150px"></canvas></div>` : ''}
    <div class="sec-title" style="margin-top:2px">Session History</div>
    ${rows || `<div style="color:#44445a;font-size:14px;padding:8px 0">No sessions yet.</div>`}
    <div style="height:8px"></div>`;

  if (st.n>1) requestAnimationFrame(()=>drawChart(id));
}

function drawChart(pid) {
  const c = document.getElementById('pchart'); if(!c) return;
  const st = DB.pstats(pid);
  const dpr = window.devicePixelRatio||1;
  const W = c.parentElement.clientWidth - 32;
  const H = 150;
  c.width = W*dpr; c.height = H*dpr;
  c.style.width = W+'px'; c.style.height = H+'px';
  const ctx = c.getContext('2d'); ctx.scale(dpr,dpr);

  // cumulative profit oldest→newest
  const raw = [...st.ss].reverse(), pts=[0]; let run=0;
  raw.forEach(s=>{ const r=s.r.find(r=>r.pid===pid); if(r) run+=r.out-r.in; pts.push(run); });

  const mn=Math.min(...pts), mx=Math.max(...pts), rng=mx-mn||1;
  const pad={t:18,b:22,l:46,r:10};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const xp=i=>pad.l+(i/(pts.length-1))*cw;
  const yp=v=>pad.t+(1-(v-mn)/rng)*ch;

  // zero line
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
  ctx.beginPath(); ctx.moveTo(pad.l,yp(0)); ctx.lineTo(pad.l+cw,yp(0)); ctx.stroke();
  ctx.setLineDash([]);

  const pos = pts[pts.length-1] >= 0;
  const gc = ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  if (pos) { gc.addColorStop(0,'rgba(0,230,118,0.25)'); gc.addColorStop(1,'rgba(0,230,118,0)'); }
  else     { gc.addColorStop(0,'rgba(255,82,82,0)');    gc.addColorStop(1,'rgba(255,82,82,0.25)'); }

  // area fill
  ctx.beginPath(); ctx.moveTo(xp(0),yp(pts[0]));
  pts.forEach((v,i)=>{ if(i) ctx.lineTo(xp(i),yp(v)); });
  ctx.lineTo(xp(pts.length-1),pad.t+ch); ctx.lineTo(xp(0),pad.t+ch); ctx.closePath();
  ctx.fillStyle=gc; ctx.fill();

  // line
  ctx.beginPath(); ctx.moveTo(xp(0),yp(pts[0]));
  pts.forEach((v,i)=>{ if(i) ctx.lineTo(xp(i),yp(v)); });
  ctx.strokeStyle=pos?'#00e676':'#ff5252'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();

  // dots
  pts.forEach((v,i)=>{
    ctx.beginPath(); ctx.arc(xp(i),yp(v),3.5,0,Math.PI*2);
    ctx.fillStyle=pos?'#00e676':'#ff5252'; ctx.fill();
  });

  // axis labels
  ctx.fillStyle='rgba(180,180,210,0.5)';
  ctx.font=`10px -apple-system,sans-serif`;
  ctx.textAlign='right';
  ctx.fillText(fp(mx), pad.l-4, pad.t+5);
  ctx.fillText(fp(mn), pad.l-4, pad.t+ch+4);
  ctx.textAlign='center';
  ctx.fillText('1', xp(0), H-4);
  ctx.fillText(String(pts.length-1), xp(pts.length-1), H-4);
}

/* ══════════════════════════════════════
   ADD / EDIT SESSION
══════════════════════════════════════ */
let eid=null, sel=new Set();

function initAdd() {
  if (eid) return;  // keep state when switching from edit flow
  eid=null; sel=new Set();
  document.getElementById('f-name').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('add-title').textContent='New Session';
  document.getElementById('cancel-btn').style.display='none';
  document.getElementById('save-btn').textContent='Save Session';
  document.getElementById('eid').value='';
  renderToggles(); renderPRRows(); updateBal();
}

function renderToggles() {
  const ps=DB.P(), el=document.getElementById('ptoggles');
  if (!ps.length) { el.innerHTML='<div style="color:#44445a;font-size:14px">Add players first from the Players tab.</div>'; return; }
  el.innerHTML = ps.map(p=>`<button class="ptoggle${sel.has(p.id)?' on':''}" onclick="toggleP('${p.id}')">${esc(p.name)}</button>`).join('');
}

function toggleP(id) {
  sel.has(id) ? sel.delete(id) : sel.add(id);
  renderToggles(); renderPRRows(); updateBal();
}

function renderPRRows() {
  const ps=DB.P().filter(p=>sel.has(p.id)), el=document.getElementById('pr-rows');
  if (!ps.length) { el.innerHTML='<div style="color:#44445a;font-size:14px;margin-bottom:10px">Select players above to enter results.</div>'; return; }
  el.innerHTML = ps.map(p=>`
    <div class="pr-row">
      <div class="pr-head">
        <span class="pr-name">${esc(p.name)}</span>
        <span class="pr-preview" id="prev-${p.id}"></span>
      </div>
      <div class="pr-inputs">
        <div><span class="mini-label">Buy-in $</span><input class="mini-input" type="number" id="bi-${p.id}" placeholder="0" min="0" step="0.01" inputmode="decimal" oninput="upPrev('${p.id}');updateBal()"></div>
        <div><span class="mini-label">Cash-out $</span><input class="mini-input" type="number" id="co-${p.id}" placeholder="0" min="0" step="0.01" inputmode="decimal" oninput="upPrev('${p.id}');updateBal()"></div>
      </div>
    </div>`).join('');

  // restore values when editing
  if (eid) {
    const s=DB.getS(eid);
    s?.r.forEach(r=>{
      const bi=document.getElementById('bi-'+r.pid);
      const co=document.getElementById('co-'+r.pid);
      if(bi) bi.value=r.in; if(co) co.value=r.out; upPrev(r.pid);
    });
  }
}

function upPrev(pid) {
  const bi=parseFloat(document.getElementById('bi-'+pid)?.value)||0;
  const co=parseFloat(document.getElementById('co-'+pid)?.value)||0;
  const el=document.getElementById('prev-'+pid); if(!el) return;
  if(bi===0&&co===0){el.textContent='';return;}
  const pnl=co-bi;
  el.textContent=fp(pnl);
  el.style.color=pnl>0?'#00e676':pnl<0?'#ff5252':'#44445a';
}

function updateBal() {
  const ps=DB.P().filter(p=>sel.has(p.id));
  let bi=0,co=0;
  ps.forEach(p=>{ bi+=parseFloat(document.getElementById('bi-'+p.id)?.value)||0; co+=parseFloat(document.getElementById('co-'+p.id)?.value)||0; });
  const diff=co-bi, ok=Math.abs(diff)<0.01;
  const vEl=document.getElementById('bal-val'), bEl=document.getElementById('bal-row'), wEl=document.getElementById('warn-box');
  if(!ps.length){vEl.textContent='—';vEl.style.color='#44445a';wEl.classList.remove('on');return;}
  vEl.textContent = ok ? '✓ Balanced' : 'Off by '+fp(diff);
  vEl.style.color = ok ? '#00e676' : '#ffd60a';
  bEl.style.borderColor = ok ? 'rgba(0,230,118,0.2)' : 'rgba(255,214,10,0.2)';
  wEl.classList.toggle('on', !ok && (bi>0||co>0));
}

function saveSession() {
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('Session name is required');return;}
  const ps=DB.P().filter(p=>sel.has(p.id));
  if(!ps.length){showToast('Select at least one player');return;}
  const results=ps.map(p=>({pid:p.id, in:parseFloat(document.getElementById('bi-'+p.id)?.value)||0, out:parseFloat(document.getElementById('co-'+p.id)?.value)||0}));
  const tbi=results.reduce((a,r)=>a+r.in,0), tco=results.reduce((a,r)=>a+r.out,0);
  const doSave=()=>{
    const d={name,notes:document.getElementById('f-notes').value.trim(),r:results,ts:Date.now()};
    if(eid){DB.putS(eid,d);showToast('Session updated');const sid=eid;resetAdd();openSD(sid);}
    else{d.id=uid();DB.addS(d);showToast('Session saved!');resetAdd();go('sessions');}
  };
  Math.abs(tco-tbi)>0.01
    ? confirm2('Unbalanced?',`Difference of ${fp(tco-tbi)}. Save anyway?`,doSave,'Save Anyway',false)
    : doSave();
}

function resetAdd() {
  eid=null; sel=new Set();
  document.getElementById('f-name').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('eid').value='';
  document.getElementById('add-title').textContent='New Session';
  document.getElementById('cancel-btn').style.display='none';
  document.getElementById('save-btn').textContent='Save Session';
  renderToggles(); renderPRRows(); updateBal();
}

function cancelEdit() { const sid=eid; resetAdd(); sid?openSD(sid):go('sessions'); }

/* ══════════════════════════════════════
   SESSIONS
══════════════════════════════════════ */
function renderSessions() {
  const ss=DB.S();
  document.getElementById('sess-meta').textContent = ss.length+' session'+(ss.length!==1?'s':'');
  const el=document.getElementById('sessions-body');
  el.innerHTML = ss.length
    ? ss.map(s=>sessRow(s)).join('')
    : `<div class="empty"><div class="empty-ico">🃏</div><div class="empty-title">No sessions yet</div><div class="empty-sub">Tap the + button to record a game</div></div>`;
}

function sessRow(s) {
  const sorted=[...s.r].sort((a,b)=>(b.out-b.in)-(a.out-a.in));
  const w=sorted[0], wn=w?DB.getP(w.pid)?.name||'?':'?', wp=w?w.out-w.in:0;
  return `<div class="row" onclick="openSD('${s.id}')">
    <div class="row-icon">🃏</div>
    <div class="row-body">
      <div class="row-name">${esc(s.name)}</div>
      <div class="row-sub">${s.r.length} players · 🏆 ${esc(wn)}</div>
    </div>
    <div class="row-end"><div class="row-val c-green">${fp(wp)}</div></div>
  </div>`;
}

let curSid=null;
function openSD(id) { curSid=id; renderSD(id); go('sdetail',true); }

function renderSD(id) {
  const s=DB.getS(id); if(!s) return;
  const sorted=[...s.r].sort((a,b)=>(b.out-b.in)-(a.out-a.in));
  const rows=sorted.map(r=>{
    const p=DB.getP(r.pid), pnl=r.out-r.in;
    return `<tr class="${pnl>0?'tr-win':pnl<0?'tr-loss':''}">
      <td><strong>${esc(p?.name||'?')}</strong>${p?.nick?`<br><span style="color:#44445a;font-size:11px">${esc(p.nick)}</span>`:''}</td>
      <td>${fa(r.in)}</td><td>${fa(r.out)}</td>
      <td class="td-pl ${cc(pnl)}">${fp(pnl)}</td>
    </tr>`;
  }).join('');
  const tbi=s.r.reduce((a,r)=>a+r.in,0);

  document.getElementById('sdetail-body').innerHTML = `
    <div>
      <div style="font-size:25px;font-weight:800;letter-spacing:-0.4px;color:#eeeef5;margin-bottom:4px">${esc(s.name)}</div>
      <div style="color:#44445a;font-size:14px">${s.r.length} players · Pot ${fa(tbi)}</div>
      ${s.notes?`<div style="color:#8888aa;font-size:13px;margin-top:8px;line-height:1.5">${esc(s.notes)}</div>`:''}
    </div>
    <div class="divider"></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Player</th><th>Buy-in</th><th>Cash-out</th><th>P/L</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="height:16px"></div>
    <div class="sec-title">Summary</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-lbl">Total Pot</div><div class="stat-val">${fa(tbi)}</div></div>
      <div class="stat-box"><div class="stat-lbl">Players</div><div class="stat-val c-purple">${s.r.length}</div></div>
    </div>
    <div style="height:8px"></div>`;
}

function editCurSession() {
  const s=DB.getS(curSid); if(!s) return;
  eid=s.id; sel=new Set(s.r.map(r=>r.pid));
  document.getElementById('f-name').value=s.name;
  document.getElementById('f-notes').value=s.notes||'';
  document.getElementById('add-title').textContent='Edit Session';
  document.getElementById('cancel-btn').style.display='block';
  document.getElementById('save-btn').textContent='Update Session';
  go('add'); renderToggles(); renderPRRows(); updateBal();
  document.getElementById('add-scroll').scrollTop=0;
}

function deleteCurSession() {
  confirm2('Delete Session?',`"${DB.getS(curSid)?.name}" will be permanently deleted.`,()=>{
    DB.delS(curSid); showToast('Session deleted'); goBack(); renderSessions();
  });
}

/* ══════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════ */
let lbm='profit';
function lbSwitch(m,btn) {
  lbm=m;
  document.querySelectorAll('.lb-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLB();
}
function renderLB() {
  const ps=DB.P(), el=document.getElementById('lb-body');
  if(!ps.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🏆</div><div class="empty-title">No players yet</div></div>`;return;}
  const ws=ps.map(p=>({p,st:DB.pstats(p.id)}));
  const srt = lbm==='profit' ? ws.sort((a,b)=>b.st.tot-a.st.tot)
            : lbm==='avg'    ? ws.sort((a,b)=>b.st.avg-a.st.avg)
            :                  ws.sort((a,b)=>b.st.wr-a.st.wr);
  el.innerHTML = srt.map((x,i)=>{
    const rc=i<3?`r${i+1}`:'rn';
    const val = lbm==='profit' ? fp(x.st.tot)
              : lbm==='avg'    ? (x.st.n ? fp(x.st.avg) : '—')
              :                  (x.st.n ? x.st.wr.toFixed(0)+'%' : '—');
    const vc = lbm==='winrate' ? (x.st.wr>=50?'c-green':'c-red') : cc(lbm==='profit'?x.st.tot:x.st.avg);
    return `<div class="row" onclick="openPD('${x.p.id}')">
      <div class="rank ${rc}">${i+1}</div>
      <div class="row-avatar">${ini(x.p.name)}</div>
      <div class="row-body"><div class="row-name">${esc(x.p.name)}</div><div class="row-sub">${x.st.n} sessions</div></div>
      <div class="row-end"><div class="row-val ${vc}">${val}</div></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   CONFIRM DIALOG
══════════════════════════════════════ */
let cfmCb=null;
function confirm2(title,msg,cb,yesLabel='Delete',danger=true) {
  cfmCb=cb;
  document.getElementById('cfm-h').textContent=title;
  document.getElementById('cfm-p').textContent=msg;
  const btn=document.getElementById('cfm-yes');
  btn.textContent=yesLabel;
  btn.className='btn '+(danger?'btn-danger':'btn-primary');
  document.getElementById('cfm').classList.add('open');
}
function cfmYes() { document.getElementById('cfm').classList.remove('open'); cfmCb?.(); cfmCb=null; }
function cfmNo()  { document.getElementById('cfm').classList.remove('open'); cfmCb=null; }

/* ══════════════════════════════════════
   DISMISS ON BACKDROP
══════════════════════════════════════ */
document.getElementById('player-sheet').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeSheet(); });
document.getElementById('cfm').addEventListener('click', e=>{ if(e.target===e.currentTarget) cfmNo(); });

   BOOT
══════════════════════════════════════ */
go('dashboard', false);
</script>
