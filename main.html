<!DOCTYPE html>

<html lang="en" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Tracker">
<meta name="theme-color" content="#0a0a0f">
<meta name="supported-color-schemes" content="dark">
<meta name="color-scheme" content="dark">
<title>Poker Tracker</title>
<style>
/* ── Force dark everywhere ── */
:root {
  color-scheme: dark;
  --bg:       #0a0a0f;
  --bg2:      #111118;
  --bg3:      #18181f;
  --bg4:      #1f1f28;
  --bg5:      #27272f;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #f2f2fa;
  --text2:    #8888aa;
  --text3:    #52526e;
  --green:    #00e676;
  --green-bg: rgba(0,230,118,0.10);
  --red:      #ff5252;
  --red-bg:   rgba(255,82,82,0.10);
  --gold:     #ffd700;
  --gold-bg:  rgba(255,215,0,0.10);
  --accent:   #7c6fff;
  --accent2:  #a78fff;
  --accent-bg:rgba(124,111,255,0.12);
  --radius:   16px;
  --rsm:      10px;
  /* iPhone safe areas */
  --sat: env(safe-area-inset-top,    0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left,   0px);
  --sar: env(safe-area-inset-right,  0px);
  /* nav bar icon area height (not including home indicator) */
  --nav-h: 54px;
  --nav-total: calc(var(--nav-h) + var(--sab));
}

*, *::before, *::after {
box-sizing: border-box;
margin: 0; padding: 0;
-webkit-tap-highlight-color: transparent;
}

/* Every element inherits dark scheme — prevents white flash / autofill */
html {
background: #0a0a0f;
color-scheme: dark;
height: -webkit-fill-available;
}
body {
background: #0a0a0f !important;
color: #f2f2fa;
font-family: -apple-system, ‘SF Pro Text’, ‘SF Pro Display’, Helvetica, Arial, sans-serif;
font-size: 16px;
line-height: 1.4;
-webkit-font-smoothing: antialiased;
/* Use 100dvh with -webkit-fill-available fallback */
min-height: 100dvh;
min-height: -webkit-fill-available;
overflow: hidden;
color-scheme: dark;
}

/* Kill white autofill on iOS */
input, textarea, select, button {
color-scheme: dark;
font-family: inherit;
}
input::placeholder, textarea::placeholder {
color: var(–text3);
-webkit-text-fill-color: var(–text3);
opacity: 1;
}
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
-webkit-box-shadow: 0 0 0 100px var(–bg3) inset !important;
-webkit-text-fill-color: var(–text) !important;
caret-color: var(–text);
}

/* ══ LAYOUT ══ */
#app {
position: fixed;
/* top edge: behind status bar, handle with padding-top */
top: 0; left: 0; right: 0; bottom: 0;
display: flex;
flex-direction: column;
background: var(–bg);
/* Push content down so it doesn’t sit under the notch/dynamic island */
padding-top: var(–sat);
}

.screen {
display: none;
flex-direction: column;
flex: 1;
overflow: hidden;
background: var(–bg);
}
.screen.active { display: flex; }

/* The scrollable content area of each screen.
Bottom padding must clear: nav bar height + home indicator + breathing room */
.scroll-area {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
overscroll-behavior-y: contain;
padding: 16px 16px calc(var(–nav-total) + 16px);
}

/* ══ TOP BAR ══ */
.topbar {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
padding: 12px 16px;
background: var(–bg);
border-bottom: 1px solid var(–border);
min-height: 52px;
}
.topbar h1 {
font-size: 22px; font-weight: 700;
letter-spacing: -.4px; color: var(–text);
}
.topbar-sub { font-size: 13px; color: var(–text3); margin-top: 2px; }
.topbar-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ══ BOTTOM NAV ══ */
#nav {
position: fixed;
bottom: 0; left: 0; right: 0;
/* Grows with home indicator so buttons never overlap it */
height: var(–nav-total);
/* Buttons sit in the top –nav-h slice; rest is transparent but blocks touches */
padding-bottom: var(–sab);
background: rgba(8, 8, 14, 0.97);
-webkit-backdrop-filter: saturate(180%) blur(24px);
backdrop-filter: saturate(180%) blur(24px);
border-top: 1px solid var(–border2);
display: flex;
align-items: flex-start; /* buttons align to top of nav, home indicator is below */
z-index: 200;
}
.nav-btn {
flex: 1;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 4px;
padding: 10px 4px 0;
height: var(–nav-h);
background: none; border: none;
color: var(–text3);
-webkit-text-fill-color: var(–text3);
font-size: 10px; font-weight: 500; letter-spacing: .3px;
cursor: pointer;
transition: color .15s;
}
.nav-btn svg { width: 23px; height: 23px; flex-shrink: 0; }
.nav-btn.active { color: var(–accent); -webkit-text-fill-color: var(–accent); }

.nav-center {
flex: 1;
display: flex; flex-direction: column;
align-items: center; justify-content: flex-start;
height: var(–nav-h);
background: none; border: none;
cursor: pointer;
}
.nav-center-bubble {
width: 48px; height: 48px;
border-radius: 50%;
background: linear-gradient(135deg, var(–accent), var(–accent2));
box-shadow: 0 4px 18px rgba(124,111,255,.55);
display: flex; align-items: center; justify-content: center;
margin-top: -14px;
}
.nav-center-bubble svg { width: 24px; height: 24px; color: #fff; }
.nav-center-label {
font-size: 10px; font-weight: 500; letter-spacing: .3px;
color: var(–text3); -webkit-text-fill-color: var(–text3);
margin-top: 3px;
}

/* ══ STAT GRID ══ */
.stat-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 10px; margin-bottom: 14px;
}
.stat-box {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: var(–rsm);
padding: 14px 12px;
display: flex; flex-direction: column; gap: 5px;
}
.stat-label { font-size: 11px; color: var(–text3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-size: 20px; font-weight: 700; letter-spacing: -.4px; color: var(–text); }
.stat-value.green  { color: var(–green);  }
.stat-value.red    { color: var(–red);    }
.stat-value.gold   { color: var(–gold);   }
.stat-value.accent { color: var(–accent); }

/* ══ CARD ══ */
.card { background: var(–bg2); border: 1px solid var(–border); border-radius: var(–radius); padding: 16px; margin-bottom: 12px; }

/* ══ BUTTONS ══ */
.btn {
display: inline-flex; align-items: center; justify-content: center; gap: 6px;
padding: 13px 18px;
border-radius: var(–rsm); border: none;
font-size: 15px; font-weight: 600;
cursor: pointer;
transition: opacity .15s, transform .1s;
-webkit-user-select: none; user-select: none;
color-scheme: dark;
}
.btn:active { opacity: .7; transform: scale(.97); }
.btn-primary {
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff !important; -webkit-text-fill-color: #fff !important;
width: 100%;
}
.btn-secondary {
background: var(–bg4);
color: var(–text) !important; -webkit-text-fill-color: var(–text) !important;
border: 1px solid var(–border2);
}
.btn-danger {
background: var(–red-bg);
color: var(–red) !important; -webkit-text-fill-color: var(–red) !important;
border: 1px solid rgba(255,82,82,.3);
}
.btn-ghost {
background: transparent;
color: var(–text2) !important; -webkit-text-fill-color: var(–text2) !important;
}
.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
.btn-icon {
padding: 9px; border-radius: 10px;
background: var(–bg4); border: 1px solid var(–border);
color: var(–text2) !important; -webkit-text-fill-color: var(–text2) !important;
width: auto;
}

/* ══ FORMS ══ */
.field { margin-bottom: 14px; }
.field label {
display: block; font-size: 12px; font-weight: 600;
color: var(–text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
}
.field input, .field textarea {
display: block; width: 100%;
background: var(–bg3) !important;
border: 1px solid var(–border2);
border-radius: var(–rsm);
padding: 13px 14px;
color: var(–text) !important;
-webkit-text-fill-color: var(–text) !important;
font-size: 16px; /* prevents iOS auto-zoom */
outline: none;
-webkit-appearance: none; appearance: none;
transition: border-color .2s;
color-scheme: dark;
}
.field input:focus, .field textarea:focus { border-color: var(–accent); }
.field textarea { resize: none; min-height: 68px; font-family: inherit; }
.field input[type=“number”] { -moz-appearance: textfield; }
.field input[type=“number”]::-webkit-inner-spin-button,
.field input[type=“number”]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* ══ LIST ITEMS ══ */
.list-item {
display: flex; align-items: center; gap: 12px;
padding: 13px 14px;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: var(–rsm);
margin-bottom: 8px;
cursor: pointer;
-webkit-user-select: none; user-select: none;
transition: background .15s;
}
.list-item:active { background: var(–bg4); }
.avatar {
width: 40px; height: 40px; border-radius: 50%;
background: var(–accent-bg); border: 1px solid rgba(124,111,255,.25);
display: flex; align-items: center; justify-content: center;
font-size: 15px; font-weight: 700; color: var(–accent);
flex-shrink: 0;
}
.li-body { flex: 1; min-width: 0; }
.li-name { font-size: 15px; font-weight: 600; color: var(–text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub  { font-size: 13px; color: var(–text3); margin-top: 2px; }
.li-end  { text-align: right; flex-shrink: 0; }
.li-val  { font-size: 16px; font-weight: 700; color: var(–text); }
.li-val.green { color: var(–green); }
.li-val.red   { color: var(–red);   }

/* ══ TABLE ══ */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(–rsm); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
text-align: left; padding: 9px 10px;
font-size: 11px; font-weight: 600; color: var(–text3);
text-transform: uppercase; letter-spacing: .4px;
border-bottom: 1px solid var(–border2);
background: var(–bg3);
}
td {
padding: 11px 10px; border-bottom: 1px solid var(–border);
color: var(–text); background: var(–bg2);
}
tr:last-child td { border-bottom: none; }
tr.tr-win  td { background: rgba(0,230,118,.04); }
tr.tr-loss td { background: rgba(255,82,82,.04); }
.col-pl { font-weight: 700; color: var(–text); }
.col-pl.green { color: var(–green); }
.col-pl.red   { color: var(–red);   }

/* ══ HELPERS ══ */
.divider { height: 1px; background: var(–border); margin: 14px 0; }
.sec-title {
font-size: 12px; font-weight: 600; color: var(–text3);
text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px;
}
.empty { text-align: center; padding: 56px 20px; color: var(–text3); }
.empty-icon  { font-size: 44px; margin-bottom: 10px; }
.empty-title { font-size: 17px; font-weight: 600; color: var(–text2); margin-bottom: 6px; }
.empty-sub   { font-size: 14px; }

.back-btn {
display: inline-flex; align-items: center; gap: 3px;
background: none; border: none;
color: var(–accent); -webkit-text-fill-color: var(–accent);
font-size: 16px; font-weight: 500; cursor: pointer; padding: 4px 0;
}

/* ══ SESSION FORM ══ */
.ptoggle-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.ptoggle {
padding: 8px 14px; border-radius: 20px;
border: 1px solid var(–border2);
background: var(–bg3);
color: var(–text2) !important; -webkit-text-fill-color: var(–text2) !important;
font-size: 14px; font-weight: 500; cursor: pointer;
transition: all .15s;
}
.ptoggle.on {
background: var(–accent-bg); border-color: var(–accent);
color: var(–accent) !important; -webkit-text-fill-color: var(–accent) !important;
}

.pr-row {
background: var(–bg3); border: 1px solid var(–border);
border-radius: var(–rsm); padding: 12px 14px; margin-bottom: 8px;
}
.pr-row-top {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 10px;
}
.pr-row-name { font-size: 15px; font-weight: 600; color: var(–text); }
.pr-row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mini-label {
display: block; font-size: 11px; font-weight: 600; color: var(–text3);
text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px;
}
.mini-input {
display: block; width: 100%;
background: var(–bg2) !important; color-scheme: dark;
border: 1px solid var(–border2); border-radius: 8px;
padding: 10px 12px;
color: var(–text) !important; -webkit-text-fill-color: var(–text) !important;
font-size: 16px; outline: none;
-webkit-appearance: none; -moz-appearance: textfield;
transition: border-color .2s;
}
.mini-input:focus { border-color: var(–accent); }
.mini-input::-webkit-inner-spin-button,
.mini-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

.balance-row {
display: flex; align-items: center; justify-content: space-between;
background: var(–bg3); border: 1px solid var(–border);
border-radius: var(–rsm); padding: 12px 14px; margin-bottom: 12px; font-size: 14px;
}
.bl { color: var(–text3); font-weight: 500; }
.bv { font-weight: 700; color: var(–text); }

.warn-box {
background: rgba(255,215,0,.07); border: 1px solid rgba(255,215,0,.25);
border-radius: var(–rsm); padding: 11px 14px;
font-size: 13px; color: var(–gold);
margin-bottom: 12px; display: none;
}
.warn-box.show { display: block; }

/* ══ LB TABS ══ */
.lb-tabs {
display: flex;
background: var(–bg3); border-radius: var(–rsm);
padding: 3px; margin-bottom: 16px;
}
.lb-tab {
flex: 1; padding: 8px 4px; border-radius: 7px;
background: none; border: none;
color: var(–text3) !important; -webkit-text-fill-color: var(–text3) !important;
font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
transition: all .2s;
}
.lb-tab.active {
background: var(–bg2);
color: var(–text) !important; -webkit-text-fill-color: var(–text) !important;
}

/* ══ RANK ══ */
.rank {
width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
font-size: 13px; font-weight: 700;
}
.r1 { background: var(–gold-bg);              color: var(–gold);   }
.r2 { background: rgba(192,192,192,.1);         color: #c0c0c0;      }
.r3 { background: rgba(205,127,50,.1);          color: #cd7f32;      }
.rn { background: var(–bg5);                   color: var(–text3); }

/* ══ BOTTOM SHEET ══ */
.sheet-bg {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,.78); z-index: 300;
align-items: flex-end;
}
.sheet-bg.open { display: flex; }
.sheet {
background: var(–bg2); color: var(–text);
border-radius: 20px 20px 0 0;
border-top: 1px solid var(–border2);
width: 100%; max-height: 90dvh;
display: flex; flex-direction: column;
/* Extra padding at bottom so content clears home indicator */
padding-bottom: var(–sab);
animation: su .26s cubic-bezier(.32,.72,0,1);
}
@keyframes su { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 36px; height: 5px; background: var(–border2); border-radius: 3px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; flex-shrink: 0; }
.sheet-title { font-size: 18px; font-weight: 700; color: var(–text); }
.sheet-body { padding: 4px 20px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }

/* ══ CONFIRM ══ */
.cfm-bg {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,.82); z-index: 400;
align-items: center; justify-content: center; padding: 24px;
}
.cfm-bg.open { display: flex; }
.cfm-box {
background: var(–bg3); border: 1px solid var(–border2);
border-radius: 20px; padding: 24px; width: 100%; max-width: 310px; text-align: center;
}
.cfm-box h3 { font-size: 18px; font-weight: 700; color: var(–text); margin-bottom: 8px; }
.cfm-box p  { font-size: 14px; color: var(–text2); margin-bottom: 20px; }
.cfm-actions { display: flex; gap: 10px; }
.cfm-actions .btn { flex: 1; }

/* ══ TOAST ══ */
#toast {
position: fixed;
bottom: calc(var(–nav-total) + 10px);
left: 50%; transform: translateX(-50%);
background: var(–bg5); border: 1px solid var(–border2);
color: var(–text); padding: 11px 22px;
border-radius: 30px; font-size: 14px; font-weight: 500;
white-space: nowrap; z-index: 500;
opacity: 0; pointer-events: none;
transition: opacity .25s;
}
#toast.show { opacity: 1; }

canvas { display: block; width: 100%; }
</style>

</head>
<body>
<div id="app">

<!-- ██ DASHBOARD ██ -->

<div class="screen active" id="s-dashboard">
  <div class="topbar">
    <div>
      <h1>♠ Poker Tracker</h1>
      <div class="topbar-sub" id="db-sub"></div>
    </div>
  </div>
  <div class="scroll-area">
    <div class="stat-grid" id="db-stats"></div>
    <div class="sec-title">Recent Sessions</div>
    <div id="db-recent"></div>
    <div class="sec-title" style="margin-top:18px">Top Players</div>
    <div id="db-top"></div>
  </div>
</div>

<!-- ██ PLAYERS ██ -->

<div class="screen" id="s-players">
  <div class="topbar">
    <h1>Players</h1>
    <button class="btn btn-primary btn-sm" style="width:auto" onclick="openPlayerSheet()">+ Add</button>
  </div>
  <div class="scroll-area" id="players-list"></div>
</div>

<!-- ██ ADD / EDIT SESSION ██ -->

<div class="screen" id="s-add">
  <div class="topbar"><h1 id="add-title">New Session</h1></div>
  <div class="scroll-area" id="add-scroll">
    <div class="field">
      <label>Session Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Game Night #12" autocomplete="off">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="f-notes" placeholder="Any notes…"></textarea>
    </div>
    <div class="sec-title">Select Players</div>
    <div class="ptoggle-wrap" id="ptoggle-wrap"></div>
    <div class="sec-title">Results</div>
    <div id="pr-rows"></div>
    <div class="balance-row" id="bal-row">
      <span class="bl">Balance check</span>
      <span class="bv" id="bal-val">—</span>
    </div>
    <div class="warn-box" id="warn-box">⚠ Buy-ins and cash-outs don't balance. Double-check before saving.</div>
    <button class="btn btn-primary" id="save-btn" onclick="saveSession()">Save Session</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" id="cancel-btn" style="display:none;width:100%" onclick="cancelEdit()">Cancel</button>
    <input type="hidden" id="editing-id">
  </div>
</div>

<!-- ██ SESSIONS ██ -->

<div class="screen" id="s-sessions">
  <div class="topbar">
    <h1>Sessions</h1>
    <div class="topbar-sub" id="sess-count"></div>
  </div>
  <div class="scroll-area" id="sessions-list"></div>
</div>

<!-- ██ LEADERBOARD ██ -->

<div class="screen" id="s-leaderboard">
  <div class="topbar"><h1>Leaderboard</h1></div>
  <div class="scroll-area">
    <div class="lb-tabs">
      <button class="lb-tab active" onclick="lbTab('profit',this)">Profit</button>
      <button class="lb-tab" onclick="lbTab('avg',this)">Average</button>
      <button class="lb-tab" onclick="lbTab('winrate',this)">Win Rate</button>
    </div>
    <div id="lb-list"></div>
  </div>
</div>

<!-- ██ SESSION DETAIL ██ -->

<div class="screen" id="s-detail">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back
    </button>
    <div class="topbar-actions">
      <button class="btn btn-icon" onclick="editSession()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="btn btn-icon" style="color:var(--red)!important;-webkit-text-fill-color:var(--red)!important" onclick="deleteSession()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>
  </div>

<!-- ██ TOAST ██ -->

<div id="toast"></div>

<script>
/* ═══════════ DATA ═══════════ */
const DB = (() => {
  let _p=null, _s=null;
  const load=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||fb;}catch{return fb;}};
  return {
    players()  { return _p||(_p=load('pt_p',[])); },
    sessions() { return _s||(_s=load('pt_s',[])); },
    sp(){ localStorage.setItem('pt_p',JSON.stringify(_p)); },
    ss(){ localStorage.setItem('pt_s',JSON.stringify(_s)); },
    addP(x)    { this.players().push(x); this.sp(); },
    putP(id,x) { const i=this.players().findIndex(p=>p.id===id); if(i>=0){Object.assign(_p[i],x);this.sp();} },
    delP(id)   { _p=this.players().filter(p=>p.id!==id); this.sp(); },
    getP(id)   { return this.players().find(p=>p.id===id); },
    addS(x)    { this.sessions().unshift(x); this.ss(); },
    putS(id,x) { const i=this.sessions().findIndex(s=>s.id===id); if(i>=0){Object.assign(_s[i],x);this.ss();} },
    delS(id)   { _s=this.sessions().filter(s=>s.id!==id); this.ss(); },
    getS(id)   { return this.sessions().find(s=>s.id===id); },
    stats(pid) {
      const ss=this.sessions().filter(s=>s.r.some(r=>r.pid===pid));
      let tot=0,bw=null,bl=null,wins=0;
      ss.forEach(s=>{
        const r=s.r.find(r=>r.pid===pid);if(!r)return;
        const pnl=r.out-r.in;tot+=pnl;
        if(pnl>0)wins++;
        if(bw===null||pnl>bw)bw=pnl;
        if(bl===null||pnl<bl)bl=pnl;
      });
      const n=ss.length;
      return{n,tot,avg:n?tot/n:0,bw:bw||0,bl:bl||0,wr:n?wins/n*100:0,sessions:ss};
    }
  };
})();

/* ═══════════ UTILS ═══════════ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fa =n=>'$'+Math.abs(n).toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
const fp =n=>(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
const cc =n=>n>0?'green':n<0?'red':'';
const ini=s=>s.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ═══════════ NAVIGATION ═══════════ */
const MAIN=['dashboard','players','add','sessions','leaderboard'];
let cur='dashboard',prev='dashboard';

function go(name,push=true){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('s-'+name);if(!el)return;
  el.classList.add('active');
  document.querySelectorAll('.nav-btn,.nav-center').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('active');
  document.getElementById('nav').style.display=MAIN.includes(name)?'flex':'none';
  if(push)prev=cur;
  cur=name;
  const renders={dashboard:renderDash,players:renderPlayers,sessions:renderSessions,leaderboard:renderLB,add:initAdd};
  if(renders[name])renders[name]();
}
function goBack(){go(prev||'dashboard');}

/* ═══════════ DASHBOARD ═══════════ */
function renderDash(){
  const ps=DB.players(),ss=DB.sessions();
  document.getElementById('db-sub').textContent=`${ps.length} player${ps.length!==1?'s':''} · ${ss.length} session${ss.length!==1?'s':''}`;
  let bigpot=0;
  ss.forEach(s=>{const t=s.r.reduce((a,r)=>a+r.in,0);if(t>bigpot)bigpot=t;});
  document.getElementById('db-stats').innerHTML=`
    <div class="stat-box"><div class="stat-label">Sessions</div><div class="stat-value accent">${ss.length}</div></div>
    <div class="stat-box"><div class="stat-label">Players</div><div class="stat-value accent">${ps.length}</div></div>
    <div class="stat-box"><div class="stat-label">Biggest Pot</div><div class="stat-value gold">${ss.length?'$'+bigpot.toFixed(0):'—'}</div></div>
    <div class="stat-box"><div class="stat-label">Last Session</div><div class="stat-value">${ss.length?esc(ss[0].name.slice(0,12)):'—'}</div></div>`;
  const recent=ss.slice(0,3);
  document.getElementById('db-recent').innerHTML=recent.length?recent.map(s=>sessItem(s)).join('')
    :`<div class="empty"><div class="empty-icon">🃏</div><div class="empty-title">No sessions yet</div><div class="empty-sub">Tap + to add your first game</div></div>`;
  const ranked=ps.map(p=>({p,st:DB.stats(p.id)})).sort((a,b)=>b.st.tot-a.st.tot).slice(0,3);
  document.getElementById('db-top').innerHTML=ranked.length?ranked.map((x,i)=>`
    <div class="list-item" onclick="openPD('${x.p.id}')">
      <div class="rank r${i<3?i+1:'n'}">${i+1}</div>
      <div class="avatar">${ini(x.p.name)}</div>
      <div class="li-body"><div class="li-name">${esc(x.p.name)}</div><div class="li-sub">${x.st.n} sessions</div></div>
      <div class="li-end"><div class="li-val ${cc(x.st.tot)}">${fp(x.st.tot)}</div></div>
    </div>`).join('')
    :`<div style="color:var(--text3);font-size:14px;padding:8px 0">No players yet.</div>`;
}

/* ═══════════ PLAYERS ═══════════ */
function renderPlayers(){
  const ps=DB.players(),el=document.getElementById('players-list');
  el.innerHTML=ps.length?ps.map(p=>{
    const st=DB.stats(p.id);
    return`<div class="list-item" onclick="openPD('${p.id}')">
      <div class="avatar">${ini(p.name)}</div>
      <div class="li-body">
        <div class="li-name">${esc(p.name)}${p.nick?` <span style="color:var(--text3);font-size:12px">"${esc(p.nick)}"</span>`:''}</div>
        <div class="li-sub">${st.n} session${st.n!==1?'s':''}</div>
      </div>
      <div class="li-end"><div class="li-val ${cc(st.tot)}">${fp(st.tot)}</div></div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">No players yet</div><div class="empty-sub">Tap "Add" to create your first player</div></div>`;
}

let _curPid=null;
function openPlayerSheet(editId){
  _curPid=editId||null;
  const p=editId?DB.getP(editId):null;
  document.getElementById('ps-title').textContent=p?'Edit Player':'Add Player';
  document.getElementById('ps-name').value=p?.name||'';
  document.getElementById('ps-nick').value=p?.nick||'';
  document.getElementById('ps-notes').value=p?.notes||'';
  document.getElementById('ps-id').value=editId||'';
  document.getElementById('player-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('ps-name').focus(),320);
}
function closePlayerSheet(){document.getElementById('player-sheet').classList.remove('open');}
function savePlayer(){
  const name=document.getElementById('ps-name').value.trim();
  if(!name){toast('Name is required');return;}
  const data={name,nick:document.getElementById('ps-nick').value.trim(),notes:document.getElementById('ps-notes').value.trim()};
  const id=document.getElementById('ps-id').value;
  if(id){DB.putP(id,data);toast('Player updated');if(cur==='pdetail')renderPD(id);}
  else{data.id=uid();DB.addP(data);toast('Player added');}
  closePlayerSheet();renderPlayers();
}
function editPlayer(){openPlayerSheet(_curPid);}
function deletePlayer(){
  confirm2('Delete Player?','This player will be removed from the roster.',()=>{
    DB.delP(_curPid);toast('Player deleted');goBack();renderPlayers();
  });
}
function openPD(id){_curPid=id;renderPD(id);go('pdetail',true);}
function renderPD(id){
  const p=DB.getP(id);if(!p)return;
  const st=DB.stats(id);
  const rows=st.sessions.map(s=>{
    const r=s.r.find(r=>r.pid===id),pnl=r.out-r.in;
    return`<div class="list-item" onclick="openSD('${s.id}')">
      <div class="li-body"><div class="li-name">${esc(s.name)}</div><div class="li-sub">${s.r.length} players · ${fa(r.in)} buy-in</div></div>
      <div class="li-end"><div class="li-val ${cc(pnl)}">${fp(pnl)}</div></div>
    </div>`;
  }).join('');
  document.getElementById('pdetail-body').innerHTML=`
    <div style="text-align:center;padding:28px 0 20px">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--accent-bg);border:2px solid rgba(124,111,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:26px;font-weight:800;color:var(--accent)">${ini(p.name)}</div>
      <div style="font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text)">${esc(p.name)}</div>
      ${p.nick?`<div style="color:var(--text3);font-size:14px;margin-top:3px">"${esc(p.nick)}"</div>`:''}
      ${p.notes?`<div style="color:var(--text2);font-size:13px;margin-top:8px">${esc(p.notes)}</div>`:''}
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Total Profit</div><div class="stat-value ${cc(st.tot)}">${fp(st.tot)}</div></div>
      <div class="stat-box"><div class="stat-label">Sessions</div><div class="stat-value accent">${st.n}</div></div>
      <div class="stat-box"><div class="stat-label">Avg / Session</div><div class="stat-value ${cc(st.avg)}">${st.n?fp(st.avg):'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Win Rate</div><div class="stat-value ${st.wr>=50?'green':'red'}">${st.n?st.wr.toFixed(0)+'%':'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Best Win</div><div class="stat-value green">${st.bw>0?fp(st.bw):'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Worst Loss</div><div class="stat-value red">${st.bl<0?fp(st.bl):'—'}</div></div>
    </div>
    ${st.n>1?`<div class="card"><div class="sec-title" style="margin-bottom:12px">Profit Over Time</div><canvas id="pchart" height="150"></canvas></div>`:''}
    <div class="sec-title" style="margin-top:4px">Session History</div>
    ${rows||`<div style="color:var(--text3);font-size:14px;padding:8px 0">No sessions yet.</div>`}
    <div style="height:8px"></div>`;
  if(st.n>1)requestAnimationFrame(()=>drawChart(id));
}

function drawChart(pid){
  const c=document.getElementById('pchart');if(!c)return;
  const st=DB.stats(pid);
  const dpr=window.devicePixelRatio||1;
  const W=c.parentElement.clientWidth-32,H=150;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  const raw=[...st.sessions].reverse(),pts=[0];
  let run=0;
  raw.forEach(s=>{const r=s.r.find(r=>r.pid===pid);if(r){run+=r.out-r.in;}pts.push(run);});
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const pad={t:16,b:24,l:44,r:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const xp=i=>pad.l+(i/(pts.length-1))*cw,yp=v=>pad.t+(1-(v-mn)/rng)*ch;
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(pad.l,yp(0));ctx.lineTo(pad.l+cw,yp(0));ctx.stroke();ctx.setLineDash([]);
  const pos=pts[pts.length-1]>=0;
  const gc=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  if(pos){gc.addColorStop(0,'rgba(0,230,118,.28)');gc.addColorStop(1,'rgba(0,230,118,0)');}
  else{gc.addColorStop(0,'rgba(255,82,82,0)');gc.addColorStop(1,'rgba(255,82,82,.28)');}
  ctx.beginPath();ctx.moveTo(xp(0),yp(pts[0]));
  pts.forEach((v,i)=>{if(i)ctx.lineTo(xp(i),yp(v));});
  ctx.lineTo(xp(pts.length-1),pad.t+ch);ctx.lineTo(xp(0),pad.t+ch);ctx.closePath();
  ctx.fillStyle=gc;ctx.fill();
  ctx.beginPath();ctx.moveTo(xp(0),yp(pts[0]));
  pts.forEach((v,i)=>{if(i)ctx.lineTo(xp(i),yp(v));});
  ctx.strokeStyle=pos?'#00e676':'#ff5252';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  pts.forEach((v,i)=>{ctx.beginPath();ctx.arc(xp(i),yp(v),3.5,0,Math.PI*2);ctx.fillStyle=pos?'#00e676':'#ff5252';ctx.fill();});
  ctx.fillStyle='rgba(144,144,176,.65)';ctx.font='11px -apple-system,sans-serif';
  ctx.textAlign='right';ctx.fillText(fp(mx),pad.l-4,pad.t+5);ctx.fillText(fp(mn),pad.l-4,pad.t+ch+5);
  ctx.textAlign='center';ctx.fillText('1',xp(0),H-6);ctx.fillText(String(pts.length-1),xp(pts.length-1),H-6);
}

/* ═══════════ ADD SESSION ═══════════ */
let _eid=null,_sel=new Set();
function initAdd(){
  if(_eid)return;
  _eid=null;_sel=new Set();
  document.getElementById('f-name').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('add-title').textContent='New Session';
  document.getElementById('cancel-btn').style.display='none';
  document.getElementById('save-btn').textContent='Save Session';
  document.getElementById('editing-id').value='';
  renderToggles();renderPRRows();updateBal();
}
function renderToggles(){
  const ps=DB.players(),el=document.getElementById('ptoggle-wrap');
  if(!ps.length){el.innerHTML=`<div style="color:var(--text3);font-size:14px">Add players first from the Players tab.</div>`;return;}
  el.innerHTML=ps.map(p=>`<button class="ptoggle${_sel.has(p.id)?' on':''}" onclick="toggleP('${p.id}')">${esc(p.name)}</button>`).join('');
}
function toggleP(id){_sel.has(id)?_sel.delete(id):_sel.add(id);renderToggles();renderPRRows();updateBal();}
function renderPRRows(){
  const ps=DB.players().filter(p=>_sel.has(p.id)),el=document.getElementById('pr-rows');
  if(!ps.length){el.innerHTML=`<div style="color:var(--text3);font-size:14px;margin-bottom:10px">Select players above to enter results.</div>`;return;}
  el.innerHTML=ps.map(p=>`
    <div class="pr-row">
      <div class="pr-row-top">
        <span class="pr-row-name">${esc(p.name)}</span>
        <span id="prev-${p.id}" style="font-size:13px;font-weight:600"></span>
      </div>
      <div class="pr-row-inputs">
        <div><span class="mini-label">Buy-in $</span><input class="mini-input" type="number" id="bi-${p.id}" placeholder="0" min="0" step="0.01" oninput="upPrev('${p.id}');updateBal()"></div>
        <div><span class="mini-label">Cash-out $</span><input class="mini-input" type="number" id="co-${p.id}" placeholder="0" min="0" step="0.01" oninput="upPrev('${p.id}');updateBal()"></div>
      </div>
    </div>`).join('');
  if(_eid){
    const s=DB.getS(_eid);
    s?.r.forEach(r=>{
      const bi=document.getElementById('bi-'+r.pid),co=document.getElementById('co-'+r.pid);
      if(bi)bi.value=r.in;if(co)co.value=r.out;upPrev(r.pid);
    });
  }
}
function upPrev(pid){
  const bi=parseFloat(document.getElementById('bi-'+pid)?.value)||0;
  const co=parseFloat(document.getElementById('co-'+pid)?.value)||0;
  const el=document.getElementById('prev-'+pid);if(!el)return;
  if(bi===0&&co===0){el.textContent='';return;}
  const pnl=co-bi;
  el.textContent=fp(pnl);
  el.style.color=pnl>0?'var(--green)':pnl<0?'var(--red)':'var(--text3)';
}
function updateBal(){
  const ps=DB.players().filter(p=>_sel.has(p.id));
  let bi=0,co=0;
  ps.forEach(p=>{bi+=parseFloat(document.getElementById('bi-'+p.id)?.value)||0;co+=parseFloat(document.getElementById('co-'+p.id)?.value)||0;});
  const diff=co-bi,ok=Math.abs(diff)<0.01;
  const vEl=document.getElementById('bal-val'),bEl=document.getElementById('bal-row'),wEl=document.getElementById('warn-box');
  if(!ps.length){vEl.textContent='—';vEl.style.color='var(--text3)';wEl.classList.remove('show');return;}
  vEl.textContent=ok?'✓ Balanced':`Off by ${fp(diff)}`;
  vEl.style.color=ok?'var(--green)':'var(--gold)';
  bEl.style.borderColor=ok?'rgba(0,230,118,.2)':'rgba(255,215,0,.2)';
  wEl.classList.toggle('show',!ok&&(bi>0||co>0));
}
function saveSession(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Session name is required');return;}
  const ps=DB.players().filter(p=>_sel.has(p.id));
  if(!ps.length){toast('Select at least one player');return;}
  const results=ps.map(p=>({pid:p.id,in:parseFloat(document.getElementById('bi-'+p.id)?.value)||0,out:parseFloat(document.getElementById('co-'+p.id)?.value)||0}));
  const tbi=results.reduce((a,r)=>a+r.in,0),tco=results.reduce((a,r)=>a+r.out,0);
  const doSave=()=>{
    const d={name,notes:document.getElementById('f-notes').value.trim(),r:results,ts:Date.now()};
    if(_eid){DB.putS(_eid,d);toast('Session updated');const sid=_eid;resetAdd();openSD(sid);}
    else{d.id=uid();DB.addS(d);toast('Session saved!');resetAdd();go('sessions');}
  };
  Math.abs(tco-tbi)>0.01?confirm2('Unbalanced?',`Difference of ${fp(tco-tbi)}. Save anyway?`,doSave,'Save Anyway',false):doSave();
}
function resetAdd(){
  _eid=null;_sel=new Set();
  document.getElementById('f-name').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('editing-id').value='';
  document.getElementById('add-title').textContent='New Session';
  document.getElementById('cancel-btn').style.display='none';
  document.getElementById('save-btn').textContent='Save Session';
  renderToggles();renderPRRows();updateBal();
}
function cancelEdit(){const sid=_eid;resetAdd();sid?openSD(sid):go('sessions');}

/* ═══════════ SESSIONS ═══════════ */
function renderSessions(){
  const ss=DB.sessions();
  document.getElementById('sess-count').textContent=ss.length+' session'+(ss.length!==1?'s':'');
  const el=document.getElementById('sessions-list');
  el.innerHTML=ss.length?ss.map(s=>sessItem(s)).join('')
    :`<div class="empty"><div class="empty-icon">🃏</div><div class="empty-title">No sessions yet</div><div class="empty-sub">Tap the + button to record a game</div></div>`;
}
function sessItem(s){
  const sorted=[...s.r].sort((a,b)=>(b.out-b.in)-(a.out-a.in));
  const w=sorted[0],wn=w?DB.getP(w.pid)?.name||'?':'?',wp=w?w.out-w.in:0;
  return`<div class="list-item" onclick="openSD('${s.id}')">
    <div style="width:38px;height:38px;border-radius:10px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🃏</div>
    <div class="li-body"><div class="li-name">${esc(s.name)}</div><div class="li-sub">${s.r.length} players · 🏆 ${esc(wn)}</div></div>
    <div class="li-end"><div class="li-val green">${fp(wp)}</div></div>
  </div>`;
}
let _curSid=null;
function openSD(id){_curSid=id;renderSD(id);go('detail',true);}
function renderSD(id){
  const s=DB.getS(id);if(!s)return;
  const sorted=[...s.r].sort((a,b)=>(b.out-b.in)-(a.out-a.in));
  const rows=sorted.map(r=>{
    const p=DB.getP(r.pid),pnl=r.out-r.in;
    return`<tr class="${pnl>0?'tr-win':pnl<0?'tr-loss':''}">
      <td><strong>${esc(p?.name||'?')}</strong>${p?.nick?`<br><span style="color:var(--text3);font-size:11px">${esc(p.nick)}</span>`:''}</td>
      <td>${fa(r.in)}</td><td>${fa(r.out)}</td>
      <td class="col-pl ${cc(pnl)}">${fp(pnl)}</td>
    </tr>`;
  }).join('');
  const tbi=s.r.reduce((a,r)=>a+r.in,0);
  document.getElementById('detail-body').innerHTML=`
    <div>
      <div style="font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--text);margin-bottom:4px">${esc(s.name)}</div>
      <div style="color:var(--text3);font-size:14px">${s.r.length} players · Pot ${fa(tbi)}</div>
      ${s.notes?`<div style="color:var(--text2);font-size:13px;margin-top:8px">${esc(s.notes)}</div>`:''}
    </div>
    <div class="divider"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Player</th><th>Buy-in</th><th>Cash-out</th><th>P/L</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="height:16px"></div>
    <div class="sec-title">Summary</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Total Pot</div><div class="stat-value">${fa(tbi)}</div></div>
      <div class="stat-box"><div class="stat-label">Players</div><div class="stat-value accent">${s.r.length}</div></div>
    </div>
    <div style="height:8px"></div>`;
}
function editSession(){
  const s=DB.getS(_curSid);if(!s)return;
  _eid=s.id;_sel=new Set(s.r.map(r=>r.pid));
  document.getElementById('f-name').value=s.name;
  document.getElementById('f-notes').value=s.notes||'';
  document.getElementById('add-title').textContent='Edit Session';
  document.getElementById('cancel-btn').style.display='block';
  document.getElementById('save-btn').textContent='Update Session';
  go('add');renderToggles();renderPRRows();updateBal();
  document.getElementById('add-scroll').scrollTop=0;
}
function deleteSession(){
  confirm2('Delete Session?',`"${DB.getS(_curSid)?.name}" will be permanently deleted.`,()=>{
    DB.delS(_curSid);toast('Session deleted');goBack();renderSessions();
  });
}

/* ═══════════ LEADERBOARD ═══════════ */
let _lbm='profit';
function lbTab(m,btn){_lbm=m;document.querySelectorAll('.lb-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderLB();}
function renderLB(){
  const ps=DB.players(),el=document.getElementById('lb-list');
  if(!ps.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">No players yet</div></div>`;return;}
  const ws=ps.map(p=>({p,st:DB.stats(p.id)}));
  const s=_lbm==='profit'?ws.sort((a,b)=>b.st.tot-a.st.tot):_lbm==='avg'?ws.sort((a,b)=>b.st.avg-a.st.avg):ws.sort((a,b)=>b.st.wr-a.st.wr);
  el.innerHTML=s.map((x,i)=>{
    const rc=i<3?`r${i+1}`:'rn';
    const val=_lbm==='profit'?fp(x.st.tot):_lbm==='avg'?(x.st.n?fp(x.st.avg):'—'):(x.st.n?x.st.wr.toFixed(0)+'%':'—');
    const vc=_lbm==='winrate'?(x.st.wr>=50?'green':'red'):cc(_lbm==='profit'?x.st.tot:x.st.avg);
    return`<div class="list-item" onclick="openPD('${x.p.id}')">
      <div class="rank ${rc}">${i+1}</div>
      <div class="avatar">${ini(x.p.name)}</div>
      <div class="li-body"><div class="li-name">${esc(x.p.name)}</div><div class="li-sub">${x.st.n} sessions</div></div>
      <div class="li-end"><div class="li-val ${vc}">${val}</div></div>
    </div>`;
  }).join('');
}

/* ═══════════ CONFIRM ═══════════ */
let _cfm=null;
function confirm2(title,msg,cb,yesLabel='Delete',danger=true){
  _cfm=cb;
  document.getElementById('cfm-title').textContent=title;
  document.getElementById('cfm-msg').textContent=msg;
  const btn=document.getElementById('cfm-yes');
  btn.textContent=yesLabel;btn.className='btn '+(danger?'btn-danger':'btn-primary');
  document.getElementById('cfm').classList.add('open');
}
function cfmYes(){document.getElementById('cfm').classList.remove('open');_cfm?.();_cfm=null;}
function cfmNo(){document.getElementById('cfm').classList.remove('open');_cfm=null;}

/* ═══════════ DISMISS ON BACKDROP ═══════════ */
document.getElementById('player-sheet').addEventListener('click',e=>{if(e.target===e.currentTarget)closePlayerSheet();});
document.getElementById('cfm').addEventListener('click',e=>{if(e.target===e.currentTarget)cfmNo();});

/* ═══════════ BOOT ═══════════ */
go('dashboard',false);
</script>
